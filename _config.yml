theme: minima
title: Scaling Pains
description: Documenting my journey through the jax scaling book
baseurl: ""
url: "https://arjuns238.github.io"
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title/
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: page
header_pages:
  - about.md
